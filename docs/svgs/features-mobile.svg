<!-- Mobile version - Single column -->
<svg viewBox="0 0 620 620" width="100%" height="580" xmlns="http://www.w3.org/2000/svg">
    <style>
        text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .box-bg { fill: #e6f4ea; stroke: #a7cdb3; stroke-width: 1; }
        .title { font-weight: 700; font-size: 14px; fill: #1a202c; }
        .content { font-size: 11px; fill: #4a5568; }
    </style>

    <g>
        <rect class="box-bg" x="16" y="16" width="588" height="84" rx="6"/>
        <rect x="16" y="16" width="4" height="84" fill="#1f883d"/>
        <text class="title" x="32" y="42">Array Serialization</text>
        <text class="content" x="32" y="66">Serialize model state with optional snake_case output</text>
        <text class="content" x="32" y="84">Selective key preservation and explicit field exclusions</text>
    </g>
    <g>
        <rect class="box-bg" x="16" y="116" width="588" height="84" rx="6"/>
        <rect x="16" y="116" width="4" height="84" fill="#1f883d"/>
        <text class="title" x="32" y="142">Attribute Controls</text>
        <text class="content" x="32" y="166">#[MapFrom], #[Trim], #[DefaultValue], #[Cast], #[NoSnakeCase]</text>
        <text class="content" x="32" y="184">Control binding, defaults, casting and output key behavior</text>
    </g>
    <g>
        <rect class="box-bg" x="16" y="216" width="588" height="84" rx="6"/>
        <rect x="16" y="216" width="4" height="84" fill="#1f883d"/>
        <text class="title" x="32" y="242">Model Loading</text>
        <text class="content" x="32" y="266">Load scoped payloads from forms or request arrays</text>
        <text class="content" x="32" y="284">Strict property validation during binding</text>
    </g>
    <g>
        <rect class="box-bg" x="16" y="316" width="588" height="84" rx="6"/>
        <rect x="16" y="316" width="4" height="84" fill="#1f883d"/>
        <text class="title" x="32" y="342">Nested Paths</text>
        <text class="content" x="32" y="366">Read and write nested values with dot notation</text>
        <text class="content" x="32" y="384">Address deep graphs such as profile.address.city</text>
    </g>
    <g>
        <rect class="box-bg" x="16" y="416" width="588" height="84" rx="6"/>
        <rect x="16" y="416" width="4" height="84" fill="#1f883d"/>
        <text class="title" x="32" y="442">Strict Quality Gates</text>
        <text class="content" x="32" y="466">Tested with PHPUnit and analyzed with PHPStan max</text>
        <text class="content" x="32" y="484">Verified by 100% mutation testing</text>
    </g>
    <g>
        <rect class="box-bg" x="16" y="516" width="588" height="84" rx="6"/>
        <rect x="16" y="516" width="4" height="84" fill="#1f883d"/>
        <text class="title" x="32" y="542">Typed Properties</text>
        <text class="content" x="32" y="566">Reflection-based type collection with scalar and DateTime casting</text>
        <text class="content" x="32" y="584">Safe readonly write protection</text>
    </g>
</svg>
