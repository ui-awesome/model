<svg viewBox="0 0 1200 380" width="100%" height="340" xmlns="http://www.w3.org/2000/svg">
    <style>
        text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .box-bg { fill: #e6f4ea; stroke: #a7cdb3; stroke-width: 1; }
        .title { font-weight: 700; font-size: 16px; fill: #1a202c; }
        .content { font-size: 13px; fill: #4a5568; }
    </style>

    <g>
        <rect class="box-bg" x="20" y="20" width="570" height="100" rx="6"/>
        <rect x="20" y="20" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="40" y="50">Array Serialization</text>
        <text class="content" x="40" y="78">Serialize model state with optional snake_case output</text>
        <text class="content" x="40" y="98">Selective key preservation and explicit field exclusions</text>
    </g>

    <g>
        <rect class="box-bg" x="610" y="20" width="570" height="100" rx="6"/>
        <rect x="610" y="20" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="630" y="50">Attribute Controls</text>
        <text class="content" x="630" y="78">#[MapFrom], #[Trim], #[DefaultValue], #[Cast], #[NoSnakeCase]</text>
        <text class="content" x="630" y="98">Control binding, defaults, casting and output key behavior</text>
    </g>

    <g>
        <rect class="box-bg" x="20" y="140" width="570" height="100" rx="6"/>
        <rect x="20" y="140" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="40" y="170">Model Loading</text>
        <text class="content" x="40" y="198">Load scoped payloads from forms or request arrays</text>
        <text class="content" x="40" y="218">Strict property validation during binding</text>
    </g>

    <g>
        <rect class="box-bg" x="610" y="140" width="570" height="100" rx="6"/>
        <rect x="610" y="140" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="630" y="170">Nested Paths</text>
        <text class="content" x="630" y="198">Read and write nested values with dot notation</text>
        <text class="content" x="630" y="218">Address deep graphs such as profile.address.city</text>
    </g>

    <g>
        <rect class="box-bg" x="20" y="260" width="570" height="100" rx="6"/>
        <rect x="20" y="260" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="40" y="290">Strict Quality Gates</text>
        <text class="content" x="40" y="318">Tested with PHPUnit and analyzed with PHPStan max</text>
        <text class="content" x="40" y="338">Verified by 100% mutation testing</text>
    </g>

    <g>
        <rect class="box-bg" x="610" y="260" width="570" height="100" rx="6"/>
        <rect x="610" y="260" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="630" y="290">Typed Properties</text>
        <text class="content" x="630" y="318">Reflection-based type collection with scalar and DateTime casting</text>
        <text class="content" x="630" y="338">Safe readonly write protection</text>
    </g>
</svg>
